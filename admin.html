<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — AI Resume Analyzer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="pin-screen" style="min-height:100vh; display:flex; align-items:center; justify-content:center;">
  <div class="card" style="max-width:340px; width:100%;">
    <div class="card-header">
      <h1>Admin Access</h1>
      <p>Enter PIN to continue</p>
    </div>
    <label>Admin PIN</label>
    <input type="password" id="pin-input" placeholder="Enter PIN" maxlength="4">
    <div id="pin-error" class="message error"></div>
    <button class="primary" onclick="checkPin()">Enter</button>
  </div>
</div>

<div id="dashboard" style="display:none;">
  <div class="navbar">
    <div class="brand"><span class="brand-dot"></span>Admin Dashboard</div>
    <nav>
      <span style="font-size:13px; color:var(--text-2); margin-right:8px;">Krushna Aghade</span>
      <button class="navbar nav button" onclick="adminLogout()">Logout</button>
    </nav>
  </div>

  <div class="container wide">
    <div class="card" style="margin-bottom:16px;">
      <div class="card-header">
        <h1>Overview</h1>
        <p id="last-updated" style="font-size:12px; color:var(--text-3);">Loading...</p>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; margin-top:8px;">
        <div style="background:var(--primary-light); border-radius:var(--radius); padding:20px; text-align:center;">
          <div style="font-size:36px; font-weight:700; color:var(--primary);" id="total-users">—</div>
          <div style="font-size:13px; color:var(--text-2); margin-top:4px;">Total Users</div>
        </div>
        <div style="background:var(--success-light); border-radius:var(--radius); padding:20px; text-align:center;">
          <div style="font-size:36px; font-weight:700; color:var(--success);" id="total-docs">—</div>
          <div style="font-size:13px; color:var(--text-2); margin-top:4px;">Total Uploads</div>
        </div>
        <div style="background:var(--warning-light); border-radius:var(--radius); padding:20px; text-align:center;">
          <div style="font-size:36px; font-weight:700; color:var(--warning);" id="total-analysis">—</div>
          <div style="font-size:13px; color:var(--text-2); margin-top:4px;">Analyses Done</div>
        </div>
      </div>
    </div>

    <div class="card" style="margin-bottom:16px;">
      <div class="card-header">
        <h1>Registered Users</h1>
      </div>
      <div id="users-list"></div>
    </div>

    <div class="card">
      <div class="card-header">
        <h1>Recent Uploads</h1>
      </div>
      <div id="docs-list"></div>
    </div>
  </div>
</div>

<script src="api.js"></script>
<script>
  const ADMIN_PIN = "REDACTED";
  const ADMIN_EMAIL = "REDACTEDaghade1@gmail.com";
  const ADMIN_PASS = "REDACTED";

  function checkPin() {
    const pin = document.getElementById("pin-input").value;
    const err = document.getElementById("pin-error");
    if (pin === ADMIN_PIN) {
      loginAdmin();
    } else {
      err.textContent = "Wrong PIN. Try again.";
    }
  }

  document.getElementById("pin-input").addEventListener("keydown", function(e) {
    if (e.key === "Enter") checkPin();
  });

  async function loginAdmin() {
    try {
      const res = await fetch(`${API_BASE_URL}/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: ADMIN_EMAIL, password: ADMIN_PASS })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail);
      localStorage.setItem("token", data.access_token);
      document.getElementById("pin-screen").style.display = "none";
      document.getElementById("dashboard").style.display = "block";
      loadStats();
      setInterval(loadStats, 10000);
    } catch (err) {
      document.getElementById("pin-error").textContent = "Admin login failed: " + err.message;
    }
  }

  function adminLogout() {
    localStorage.removeItem("token");
    document.getElementById("dashboard").style.display = "none";
    document.getElementById("pin-screen").style.display = "flex";
    document.getElementById("pin-input").value = "";
  }

  async function loadStats() {
    try {
      const data = await apiRequest("/admin/stats");

      document.getElementById("total-users").textContent = data.total_users;
      document.getElementById("total-docs").textContent = data.total_documents;
      document.getElementById("total-analysis").textContent = 
        data.recent_documents.filter(d => d.status === "COMPLETED").length;
      document.getElementById("last-updated").textContent = 
        "Last updated: " + new Date().toLocaleTimeString();

      const usersList = document.getElementById("users-list");
      if (data.users.length === 0) {
        usersList.innerHTML = '<div class="empty-state">No users registered yet</div>';
      } else {
        usersList.innerHTML = data.users.map(u => `
          <div class="doc-row">
            <div>
              <div class="doc-name">${u.name}</div>
              <div class="doc-meta">${u.email}</div>
            </div>
            <div style="text-align:right;">
              <div class="doc-name">${u.total_uploads} uploads</div>
              <div class="doc-meta">User ID: ${u.id}</div>
            </div>
          </div>
        `).join('');
      }

      const docsList = document.getElementById("docs-list");
      if (data.recent_documents.length === 0) {
        docsList.innerHTML = '<div class="empty-state">No uploads yet</div>';
      } else {
        docsList.innerHTML = data.recent_documents.map(d => `
          <div class="doc-row">
            <div>
              <div class="doc-name">${d.filename}</div>
              <div class="doc-meta">User ID: ${d.user_id} · ${new Date(d.uploaded_at).toLocaleString()}</div>
            </div>
            <span class="status-badge ${d.status}">
              <span class="dot"></span>${d.status}
            </span>
          </div>
        `).join('');
      }

    } catch (err) {
      console.error("Admin stats error:", err);
    }
  }
</script>
</body>
</html>
